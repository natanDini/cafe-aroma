<app-header></app-header>

<ion-content [fullscreen]="true">

  <div class="contato-hero">
    <h1 class="contato-titulo">Fale Conosco</h1>
    <div class="divider-gold"></div>
    <p class="contato-subtitulo">Estamos aqui para ouvir você</p>
  </div>

  <div class="contato-wrapper">

    <div class="sucesso-card" *ngIf="enviado">
      <ion-icon name="checkmark-circle-outline" class="sucesso-icone"></ion-icon>
      <h2 class="sucesso-titulo">Mensagem enviada!</h2>
      <p class="sucesso-texto">Em breve entraremos em contato com você.</p>
      <button class="btn-novo" (click)="novoContato()">Enviar outra mensagem</button>
    </div>

    <form class="contato-form" *ngIf="!enviado" [formGroup]="form" (ngSubmit)="enviar()">

      <div class="campo-grupo">
        <label class="campo-label">
          <ion-icon name="person-outline"></ion-icon>
          Nome
        </label>
        <input class="campo-input" type="text" formControlName="nome" placeholder="Seu nome completo"
          [class.invalido]="nome.invalid && nome.touched">
        <span class="campo-erro" *ngIf="nome.invalid && nome.touched">
          Nome deve ter pelo menos 2 caracteres
        </span>
      </div>

      <div class="campo-grupo">
        <label class="campo-label">
          <ion-icon name="mail-outline"></ion-icon>
          E-mail
        </label>
        <input class="campo-input" type="email" formControlName="email" placeholder="seu@email.com"
          [class.invalido]="email.invalid && email.touched">
        <span class="campo-erro" *ngIf="email.invalid && email.touched">
          Informe um e-mail válido
        </span>
      </div>

      <div class="campo-grupo">
        <label class="campo-label">
          <ion-icon name="chatbubble-outline"></ion-icon>
          Mensagem
        </label>
        <textarea class="campo-input campo-textarea" formControlName="mensagem" placeholder="Como podemos ajudar?"
          rows="5" [class.invalido]="mensagem.invalid && mensagem.touched">
        </textarea>
        <span class="campo-erro" *ngIf="mensagem.invalid && mensagem.touched">
          Mensagem deve ter pelo menos 10 caracteres
        </span>
      </div>

      <div class="campo-erro-geral" *ngIf="erro">
        Erro ao enviar. Tente novamente em instantes.
      </div>

      <button class="btn-enviar" type="submit" [disabled]="enviando">
        <ion-spinner name="crescent" *ngIf="enviando"
          style="--color: var(--cafe-beige); width: 18px; height: 18px;"></ion-spinner>
        <span *ngIf="!enviando">Enviar mensagem</span>
      </button>

    </form>

    <div class="contato-info">
      <div class="info-item">
        <ion-icon name="mail-outline"></ion-icon>
        <span>contato@cafearoma.com.br</span>
      </div>
    </div>

  </div>

  <app-footer></app-footer>

</ion-content>
